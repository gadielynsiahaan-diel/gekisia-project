<script>

/* =========================
   DROPDOWN ROLE
========================= */

const roleSelect =
document.getElementById("roleSelect");

const churchGroup =
document.getElementById("churchGroup");

/* HIDE AWAL */

churchGroup.style.display = "none";

/* SAAT ROLE BERUBAH */

roleSelect.addEventListener(
  "change",

  function () {

    if(this.value === "gereja") {

      churchGroup.style.display =
      "block";

    }

    else {

      churchGroup.style.display =
      "none";

    }

  }

);

</script>
