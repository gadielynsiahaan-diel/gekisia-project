<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kelola Galeri</title>

<link rel="stylesheet" href="../css/dashboard.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div class="dashboard-container">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <div class="sidebar-logo">

            <img src="../logo.png" class="logo">

            <h2>GEKISIA</h2>

            <p>Admin Panel</p>

        </div>
        
        <ul>

            <li><a href="dashboard-sinode.html"><i class="fa-solid fa-house"></i> Dashboard</a></li>

            <li><a href="berita-admin.html"><i class="fa-solid fa-newspaper"></i> Berita</a></li>

            <li><a href="sdm.html"><i class="fa-solid fa-users"></i> SDM</a></li>

            <li><a href="galeri-admin.html"><i class="fa-solid fa-image"></i> Galeri</a></li>

            <li><a href="../index.html" id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i> Logout</a></li>

        </ul>

    </aside>

    <!-- CONTENT -->

    <main class="main-content">

        <div class="topbar">

            <h1>Kelola Galeri</h1>

            <div class="table-header">

                <input
                type="text"
                placeholder="Cari Foto..."
                id="searchGaleri">

                <button id="btnTambah">
                    + Tambah Foto
                </button>

            </div>

        </div>

        <div class="table-container">

            <table>

                <thead>

                    <tr>

                        <th>Foto</th>
                        <th>Judul</th>
                        <th>Deskripsi</th>
                        <th>Tanggal</th>
                        <th>Aksi</th>

                    </tr>

                </thead>

                <tbody id="listGaleri">

                </tbody>

            </table>

        </div>

    </main>

</div>

<!-- Modal -->

<div id="modalGaleri" class="modal">

    <div class="modal-content">

        <h2>Tambah Foto</h2>

        <input
        type="text"
        id="judul"
        placeholder="Judul">

        <br><br>

        <textarea
        id="deskripsi"
        placeholder="Deskripsi"></textarea>

        <br><br>

        <input
        type="file"
        id="gambar">

        <br><br>

        <button onclick="simpanGaleri()">
            Simpan
        </button>

        <button onclick="tutupModal()">
            Batal
        </button>

    </div>

</div>

<script src="../js/auth.js"></script>
<script src="../js/galeri.js"></script>


</body>

</html>
