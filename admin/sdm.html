<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kelola SDM</title>

<link rel="stylesheet" href="../css/dashboard.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div class="dashboard-container">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <div class="sidebar-logo">

            <img src="../logo.png" class="logo">

            <h2>GEKISIA</h2>

            <p>Admin Panel</p>

        </div>

        <ul>

            <li><a href="dashboard-sinode.html"><i class="fa-solid fa-house"></i> Dashboard</a></li>

            <li><a href="berita-admin.html"><i class="fa-solid fa-newspaper"></i> Berita</a></li>

            <li><a href="sdm.html"><i class="fa-solid fa-users"></i> SDM</a></li>

            <li><a href="galeri-admin.html"><i class="fa-solid fa-image"></i> Galeri</a></li>

            <li><a href="../index.html" id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i> Logout</a></li>

        </ul>

    </aside>

    <!-- CONTENT -->

    <main class="main-content">

        <div class="topbar">

            <h1>Kelola SDM</h1>

            <div class="table-header">

                <input
                type="text"
                placeholder="Cari Foto..."
                id="searchGaleri">

                <button onclick="bukaModal()">
                    + Tambah SDM
                </button>

            </div>

        </div>

        <div class="table-container">

            <table>

                <thead>

                    <tr>

                        <tr>

                            <th>Nomor</th>
                            <th>Kategori</th>
                            <th>Nama</th>
                            <th>Aksi</th>

                        </tr>

                    </tr>

                </thead>

                <tbody id="tbodySDM">

                </tbody>

            </table>

        </div>

    </main>

</div>

<!-- Modal -->

<div id="modalSDM" class="modal">

    <div class="modal-content">

        <h2 id="judulModal">Tambah SDM</h2>

        <input type="hidden" id="idSDM">

        
        <label>Kategori</label>

        <select id="kategori">

            <option value="">-- Pilih Kategori --</option>

            <option value="Tenaga Kependetaan">Tenaga Kependetaan</option>

            <option value="Tenaga Vikaris">Tenaga Vikaris</option>

            <option value="Tenaga Orientasi">Tenaga Orientasi</option>

            <option value="Tenaga Emeritus">Tenaga Emeritus</option>

        </select>

        <label>Nama</label>

        <input
        type="text"
        id="nama">

        <label>Urutan</label>

        <input
        type="number"
        id="urutan">

        <button onclick="simpanSDM()">

            Simpan

        </button>

    </div>

</div>

<script src="../js/sdm.js"></script>

</body>

</html>
