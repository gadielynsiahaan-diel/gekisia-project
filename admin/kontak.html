<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kontak Gereja</title>

<link rel="stylesheet" href="../css/dashboard.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div class="dashboard-container">

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <div class="sidebar-logo">

            <img src="../logo.png" class="logo">

            <h2>GEKISIA</h2>

            <p>Admin Panel</p>

        </div>

        <ul>

            <li><a href="dashboard-gereja.html"><i class="fa fa-house"></i> Dashboard</a></li>

            <li><a href="gereja.html"><i class="fa fa-church"></i> Profil Gereja</a></li>

            <li><a href="jemaat.html"><i class="fa fa-users"></i> Data Jemaat</a></li>

            <li><a href="agenda.html"><i class="fa fa-calendar-days"></i> Agenda</a></li>

            <li><a href="galeri.html"><i class="fa fa-images"></i> Galeri</a></li>

            <li><a href="kontak.html"><i class="fa fa-phone"></i> Kontak</a></li>

            <li><a href="../index.html"><i class="fa fa-right-from-bracket"></i> Logout</a></li>

        </ul>

    </aside>

    <!-- MAIN -->

    <main class="main-content">

        <div class="topbar">

            <h1>Kontak Gereja</h1>

        </div>

        <div class="table-container">

            <div class="form-container">

                <div class="form-group">

                    <label>Alamat Gereja</label>

                    <textarea
                      id="alamat"
                      rows="4"
                      placeholder="Masukkan alamat gereja"></textarea>

                </div>

                <div class="form-group">

                    <label>Nomor Telepon</label>

                    <input
                        type="text"
                        id="telepon"
                        placeholder="08123456789">

                </div>

                <div class="form-group">

                    <label>Email</label>

                    <input
                        type="email"
                        id="email"
                        placeholder="gereja@email.com">

                </div>

                <div class="form-group">
                    <label>Instagram</label>
                    <input
                        type="text"
                        id="instagram"
                        placeholder="https://instagram.com/...">
                </div>

                <div class="form-group">
                    <label>Facebook</label>
                    <input
                        type="text"
                        id="facebook"
                        placeholder="https://facebook.com/...">
                </div>

                <div class="form-group">
                    <label>TikTok</label>
                    <input
                        type="text"
                        id="tiktok"
                        placeholder="https://tiktok.com/@...">
                </div>

                <div class="form-group">
                    <label>YouTube</label>
                    <input
                        type="text"
                        id="youtube"
                        placeholder="https://youtube.com/...">
                </div>

                <div class="form-group">

                    <label>Link Google Maps</label>

                    <textarea
                        id="maps"
                        rows="4"
                        placeholder="https://maps.google.com/..."></textarea>

                </div>

                <button
                    class="btn-tambah"
                    onclick="simpanKontak()">

                    <i class="fa-solid fa-floppy-disk"></i>

                    Simpan

                </button>

            </div>

        </div>

    </main>

</div>

<script src="../js/auth.js"></script>
<script src="../js/kontak.js"></script>

</body>
</html>
