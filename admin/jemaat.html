<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Data Jemaat</title>

<link rel="stylesheet" href="../css/dashboard.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div class="dashboard-container">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <div class="sidebar-logo">
            <img src="../logo.png" class="logo">
            <h2>GEKISIA</h2>
            <p>Admin Panel</p>
        </div>

        <ul>

            <li><a href="dashboard-gereja.html"><i class="fa fa-house"></i> Dashboard</a></li>

            <li><a href="gereja.html"><i class="fa fa-church"></i> Profil Gereja</a></li>

            <li><a href="jemaat.html"><i class="fa fa-users"></i> Data Jemaat</a></li>

            <li><a href="agenda.html"><i class="fa fa-calendar"></i> Agenda</a></li>

            <li><a href="galeri.html"><i class="fa fa-images"></i> Galeri</a></li>

            <li><a href="kontak.html"><i class="fa fa-phone"></i> Kontak</a></li>

            <li><a href="../index.html"><i class="fa fa-right-from-bracket"></i> Logout</a></li>

        </ul>

    </aside>

    <!-- MAIN -->

    <main class="main-content">

        <div class="topbar">

            <h1>Data Jemaat</h1>

            <button
            class="btn-tambah"
            onclick="bukaModal()">

            <i class="fa fa-plus"></i>

            Tambah Data

            </button>

        </div>

        <div class="table-container">

            <table>

                <thead>

                    <tr>

                        <th>Tahun</th>
                        <th>Anak</th>
                        <th>Remaja</th>
                        <th>Pemuda</th>
                        <th>Dewasa</th>
                        <th>Lansia</th>
                        <th>Total</th>
                        <th>Aksi</th>

                    </tr>

                </thead>

                <tbody id="tbodyJemaat">

                </tbody>

            </table>

        </div>

    </main>

</div>

<div class="modal" id="modal">

<div class="modal-content">

<h2>Data Jemaat</h2>

<input type="hidden" id="id">

<input type="number" id="anak" placeholder="Jumlah Anak">

<input type="number" id="remaja" placeholder="Jumlah Remaja">

<input type="number" id="pemuda" placeholder="Jumlah Pemuda">

<input type="number" id="dewasa" placeholder="Jumlah Dewasa">

<input type="number" id="lansia" placeholder="Jumlah Lansia">

<input type="number" id="tahun" placeholder="Tahun">

<br><br>

<button onclick="simpan()">

Simpan

</button>

<button onclick="tutupModal()">

Batal

</button>

</div>

</div>

<script src="../js/auth.js"></script>

<script src="../js/jemaat.js"></script>

</body>
</html>
